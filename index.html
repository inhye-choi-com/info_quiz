<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단원 평가 퀴즈</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti for fireworks effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 selection:bg-blue-200">

    <div id="app" class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden relative min-h-[400px] flex flex-col fade-in">
        <!-- 내용이 JS에 의해 여기에 동적으로 렌더링 됩니다. -->
    </div>

    <!-- 피드백 메시지를 보여줄 토스트 알림 -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg text-white font-bold transition-all duration-300 opacity-0 pointer-events-none z-50 translate-y-[-20px]">
        메시지
    </div>

    <script>
        // --- 퀴즈 데이터 정의 ---
        // 교재 이미지를 바탕으로 구성된 문제들입니다.
        const questions = [
            { id: 1, type: 'ox', q: '아날로그는 연속적인 데이터를 불연속적이고 명확한 수치로 표현한 것이다.', a: 'X', hint: '불연속적이고 명확한 수치로 표현하는 것은 디지털입니다.' },
            { id: 2, type: 'ox', q: '문자, 이미지, 소리, 동영상과 같은 실생활 데이터는 컴퓨터 내부에서 모두 아날로그로 처리된다.', a: 'X', hint: '컴퓨터 내부에서는 모두 디지털(0과 1)로 처리됩니다.' },
            { id: 3, type: 'ox', q: '데이터를 속성별로 구분하여 정리하면 목적에 따라 필요한 정보를 빠르게 찾을 수 있고, 데이터의 활용도를 높일 수 있다.', a: 'O' },
            { id: 4, type: 'ox', q: '표는 데이터를 속성별로 구분하여 정리할 수 있고, 데이터의 추가·삭제·수정이 편리하여 대량의 데이터를 관리할 때 사용한다.', a: 'O' },
            { id: 5, type: 'ox', q: '데이터 분석이란 수집한 데이터의 의미를 해석하며 유용한 정보를 찾아내는 과정을 뜻한다.', a: 'O' },
            { id: 6, type: 'multiple', q: '디지털 데이터의 특징으로 알맞은 것은?', options: ['데이터를 검색하고 공유하기 어렵다.', '데이터의 편집, 가공, 전송이 어렵다.', '많은 양의 데이터를 효율적으로 저장하고 처리할 수 있다.', '적은 양의 데이터를 저장하기 위해 많은 저장 공간이 필요하다.', '디지털 기기 간에 데이터를 전송하려면 별도의 장치가 필요하다.'], a: 2 },
            { id: 7, type: 'multiple', q: '이미지를 디지털로 표현하는 방법 중 비트맵 방식의 설명으로 알맞은 것을 [보기]에서 모두 고르시오.<br><div class="bg-gray-50 border border-gray-200 rounded p-4 my-3 text-sm font-normal text-left text-gray-700 leading-relaxed">[보기]<br>ㄱ. 이미지를 픽셀 단위로 구분해서 표현한다.<br>ㄴ. 수식을 이용하여 선, 색상, 모양 등을 표현한다.<br>ㄷ. 컴퓨터는 색상 코드를 사용하여 픽셀 정보를 저장하고 표현한다.<br>ㄹ. 픽셀 수와 색상 수가 적어질수록 이미지가 실제와 같아지고 정교해진다.</div>', options: ['ㄱ, ㄴ', 'ㄱ, ㄷ', 'ㄱ, ㄹ', 'ㄴ, ㄷ', 'ㄷ, ㄹ'], a: 1 },
            { id: 8, type: 'short', q: '아날로그 소리의 파형을 일정 간격으로 나누고, 소리의 크기를 가까운 정숫값으로 표현한 뒤, <b>[ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ]</b>(으)로 변환하여 디지털 소리로 표현한다.<br><br>빈칸에 들어갈 알맞은 용어를 쓰시오.', a: '이진수' },
            { id: 9, type: 'short', q: '동영상은 여러 개의 프레임을 빠른 속도로 넘겼을 때 생기는 <b>[ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ]</b>(을)를 이용한 것이다.<br><br>빈칸에 들어갈 알맞은 말을 쓰시오.', a: '잔상효과', alt: '잔상 효과' },
            { id: 10, type: 'multiple', q: '데이터 수집에 관한 설명으로 알맞은 것을 [보기]에서 있는대로 고르시오.<br><div class="bg-gray-50 border border-gray-200 rounded p-4 my-3 text-sm font-normal text-left text-gray-700 leading-relaxed">[보기]<br>ㄱ. 관찰, 인터뷰, 설문 조사, 센서를 이용하는 방법은 데이터를 직접 수집하는 방법이다.<br>ㄴ. 검색 엔진과 데이터 전문 웹 사이트를 이용하면 목적에 맞는 데이터를 수집할 수 있지만 시간과 비용이 많이 든다.<br>ㄷ. 데이터를 수집할 때는 데이터의 객관성, 데이터의 품질, 데이터의 정확성을 확인해야 한다.</div>', options: ['ㄴ', 'ㄷ', 'ㄱ, ㄴ', 'ㄱ, ㄷ', 'ㄱ, ㄴ, ㄷ'], a: 3 },
            { id: 11, type: 'short', q: '데이터의 특성에 따른 종류와 활용에 관해 바르게 설명한 친구의 이름을 쓰시오.<br><div class="bg-gray-50 border border-gray-200 rounded p-4 my-3 text-sm font-normal text-left text-gray-700 leading-relaxed"><b>우현</b>: 수치형 데이터의 예에는 성별, 혈액형, 성취 등급이 있어.<br><b>예성</b>: 키, 몸무게, 전자 우편 수는 범주형 데이터라고 할 수 있어.<br><b>은지</b>: 수집한 데이터를 체계적으로 구분하면 데이터의 활용도를 높일 수 있어.</div>', a: '은지' },
            { id: 12, type: 'multiple', q: '다음과 같은 데이터 구조화 방법에 관한 설명으로 알맞은 것은?<br><div class="overflow-x-auto my-3"><table class="w-full text-sm border-collapse border border-gray-300 text-center bg-white"><thead class="bg-gray-200"><tr><th class="border border-gray-300 p-2 font-medium">이름</th><th class="border border-gray-300 p-2 font-medium">전화번호</th><th class="border border-gray-300 p-2 font-medium">휴대전화 번호</th><th class="border border-gray-300 p-2 font-medium">주소</th></tr></thead><tbody><tr><td class="border border-gray-300 p-2">김O경</td><td class="border border-gray-300 p-2">3590-1***</td><td class="border border-gray-300 p-2">010-3***-****</td><td class="border border-gray-300 p-2">OO시</td></tr><tr><td class="border border-gray-300 p-2">김O수</td><td class="border border-gray-300 p-2">3490-2***</td><td class="border border-gray-300 p-2">010-5***-****</td><td class="border border-gray-300 p-2">△△군</td></tr></tbody></table></div>', options: ['계층형 다이어그램으로 구조화하였다.', '데이터 간의 분류 체계와 관계를 파악하기 쉽다.', '점 정, 선, 도형, 기호 등을 사용하여 데이터의 관계를 표현하는 구조화 방법이다.', '대량의 데이터를 관리할 때 주로 사용하는 구조로 데이터의 추가, 삭제, 수정이 쉽다.', '회사나 학급의 조직도, 컴퓨터의 폴더 구조 등도 이 방법으로 구조화하기 적합하다.'], a: 3 },
            { id: 13, type: 'short', q: '합리적 의사 결정을 위해 수집한 데이터의 의미를 해석하여 유용한 정보를 찾아내는 과정을 의미하는 용어를 쓰시오.', a: '데이터분석', alt: '데이터 분석' },
            { id: 14, type: 'essay', q: '데이터 구조화의 장점을 간단히 쓰시오.', a: '빠른 데이터 검색과 효율적인 데이터 관리가 가능하다. 시각적으로 표현하기 쉽기 때문에 데이터의 관계 파악과 분석이 편리하다.' }
        ];

        // --- 앱 상태 변수 ---
        let currentIdx = 0;
        let attempts = 0; // 현재 문제에서 틀린 횟수
        let wrongList = [];
        let isProcessing = false; // 버튼 연타 방지

        const appEl = document.getElementById('app');
        const toastEl = document.getElementById('toast');

        // --- 렌더링 함수들 ---

        function startQuiz() {
            currentIdx = 0;
            wrongList = [];
            renderQuestion();
        }

        function renderQuestion() {
            if (currentIdx >= questions.length) {
                renderResult();
                return;
            }

            attempts = 0; // 문제 넘어갈 때 기회 초기화
            isProcessing = false;
            const q = questions[currentIdx];
            const progressPct = ((currentIdx) / questions.length) * 100;

            let html = `
                <!-- 진행률 바 -->
                <div class="h-2 w-full bg-gray-200">
                    <div class="h-2 bg-blue-500 transition-all duration-500" style="width: ${progressPct}%"></div>
                </div>
                
                <div class="p-6 md:p-8 flex-grow flex flex-col" id="quiz-content">
                    <div class="mb-4">
                        <span class="inline-block px-3 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded-full mb-2">문제 ${currentIdx + 1} / ${questions.length}</span>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800 leading-tight">${q.q}</h2>
                    </div>
                    
                    <div class="mt-4 flex-grow flex flex-col justify-center">
            `;

            // 문제 유형에 따른 입력부 렌더링
            if (q.type === 'ox') {
                html += `
                    <div class="flex gap-4">
                        <button onclick="submitAnswer('O')" class="flex-1 bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 text-blue-600 font-bold text-4xl py-12 rounded-xl transition-colors">O</button>
                        <button onclick="submitAnswer('X')" class="flex-1 bg-red-50 hover:bg-red-100 border-2 border-red-200 text-red-600 font-bold text-4xl py-12 rounded-xl transition-colors">X</button>
                    </div>
                `;
            } else if (q.type === 'multiple') {
                html += `<div class="space-y-3">`;
                q.options.forEach((opt, idx) => {
                    html += `
                        <button onclick="submitAnswer(${idx})" class="w-full text-left p-4 border border-gray-300 rounded-xl hover:bg-blue-50 hover:border-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors text-gray-700 flex items-center">
                            <span class="w-8 h-8 flex items-center justify-center bg-gray-100 text-gray-600 font-bold rounded-full mr-3 shrink-0">${idx + 1}</span>
                            <span>${opt}</span>
                        </button>
                    `;
                });
                html += `</div>`;
            } else if (q.type === 'short') {
                html += `
                    <div class="mt-4">
                        <input type="text" id="short-answer" placeholder="정답을 입력하세요" class="w-full p-4 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-blue-500 text-lg text-center" onkeypress="if(event.key==='Enter') document.getElementById('submit-btn').click();" autocomplete="off">
                        <button id="submit-btn" onclick="submitAnswer(document.getElementById('short-answer').value)" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-colors text-lg">제출하기</button>
                    </div>
                `;
            } else if (q.type === 'essay') {
                html += `
                    <div class="mt-4 flex-grow flex flex-col">
                        <textarea id="essay-answer" placeholder="정답을 자유롭게 작성해보세요." class="w-full p-4 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-blue-500 text-lg flex-grow resize-none mb-4 min-h-[120px]"></textarea>
                        <button id="submit-btn" onclick="checkEssay()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-colors text-lg">모범 답안 확인하기</button>
                    </div>
                `;
            }

            html += `
                    </div>
                </div>
            `;
            
            appEl.innerHTML = html;
            
            // 렌더링 후 주관식이면 인풋에 포커스
            const inputEl = document.getElementById('short-answer');
            const textareaEl = document.getElementById('essay-answer');
            if(inputEl) setTimeout(() => inputEl.focus(), 100);
            if(textareaEl) setTimeout(() => textareaEl.focus(), 100);
        }

        // 서술형 모범답안 확인 화면 생성 함수
        function checkEssay() {
            const q = questions[currentIdx];
            const userAns = document.getElementById('essay-answer').value;
            if(!userAns || userAns.trim() === '') {
                showToast('답안을 작성해주세요.', 'bg-gray-800');
                return;
            }
            
            const contentEl = document.getElementById('quiz-content');
            contentEl.innerHTML = `
                <div class="mb-4">
                    <span class="inline-block px-3 py-1 bg-purple-100 text-purple-700 text-xs font-bold rounded-full mb-2">스스로 채점하기</span>
                    <h2 class="text-xl md:text-2xl font-bold text-gray-800 leading-tight">${q.q}</h2>
                </div>
                
                <div class="mt-4 flex-grow flex flex-col justify-center space-y-4">
                    <div class="p-4 bg-gray-50 border border-gray-200 rounded-xl text-left">
                        <div class="text-sm text-gray-500 font-bold mb-1">내가 쓴 답:</div>
                        <div class="text-gray-800 break-words">${userAns.replace(/\n/g, '<br>')}</div>
                    </div>
                    <div class="p-4 bg-green-50 border border-green-200 rounded-xl text-left">
                        <div class="text-sm text-green-600 font-bold mb-1">모범 답안:</div>
                        <div class="text-green-800 font-medium break-words">${q.a}</div>
                    </div>
                    
                    <div class="pt-4 text-center">
                        <p class="text-gray-700 font-bold mb-3">모범 답안과 의미가 비슷하게 작성되었나요?</p>
                        <div class="flex gap-4">
                            <button onclick="submitAnswer('O', true)" class="flex-1 bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 text-blue-600 font-bold py-3 rounded-xl transition-colors">네 (정답 처리)</button>
                            <button onclick="submitAnswer('X', true)" class="flex-1 bg-red-50 hover:bg-red-100 border-2 border-red-200 text-red-600 font-bold py-3 rounded-xl transition-colors">아니요 (오답 처리)</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function submitAnswer(userAnswer, isSelfGraded = false) {
            if (isProcessing) return;
            
            const q = questions[currentIdx];
            let isCorrect = false;

            // 정답 체크 로직
            if (isSelfGraded) {
                isCorrect = (userAnswer === 'O');
            } else if (q.type === 'ox' || q.type === 'multiple') {
                isCorrect = (userAnswer === q.a);
            } else if (q.type === 'short') {
                if(!userAnswer || userAnswer.trim() === '') {
                    showToast('정답을 입력해주세요.', 'bg-gray-800');
                    return;
                }
                // 공백 제거 후 비교하여 유연한 채점
                const cleanUserAns = userAnswer.replace(/\s+/g, '').toLowerCase();
                const cleanAns = q.a.replace(/\s+/g, '').toLowerCase();
                const cleanAltAns = q.alt ? q.alt.replace(/\s+/g, '').toLowerCase() : null;
                
                isCorrect = (cleanUserAns === cleanAns || cleanUserAns === cleanAltAns);
            }

            isProcessing = true;

            if (isCorrect) {
                // 정답일 때
                showToast('🎉 정답입니다!', 'bg-green-500');
                fireConfetti();
                
                setTimeout(() => {
                    currentIdx++;
                    renderQuestion();
                }, 1500);

            } else {
                // 오답일 때
                if (attempts === 0 && !isSelfGraded) {
                    // 첫 번째 오답 -> 기회 한 번 더 (자가 채점 서술형은 스킵)
                    attempts++;
                    showToast('아쉽네요! 한 번 더 기회가 있습니다. 🤔', 'bg-orange-500');
                    
                    const quizContent = document.getElementById('quiz-content');
                    quizContent.classList.remove('shake');
                    void quizContent.offsetWidth; // trigger reflow
                    quizContent.classList.add('shake');
                    
                    if(q.type === 'short') {
                        document.getElementById('short-answer').value = '';
                        document.getElementById('short-answer').focus();
                    }
                    isProcessing = false;

                } else {
                    // 두 번째 오답 또는 자가 채점 오답 -> 오답 노트에 추가 후 다음으로 넘어감
                    if (q.type === 'essay') {
                        showToast('오답 노트에 추가되었습니다.', 'bg-red-500');
                    } else {
                        const ansText = getAnswerText(q);
                        showToast(`틀렸습니다! 정답은 [${ansText}] 입니다.`, 'bg-red-500');
                    }
                    wrongList.push(q);
                    
                    setTimeout(() => {
                        currentIdx++;
                        renderQuestion();
                    }, 2000);
                }
            }
        }

        // 결과 화면
        function renderResult() {
            const score = questions.length - wrongList.length;
            const isPerfect = wrongList.length === 0;
            
            let html = `
                <div class="h-2 w-full bg-blue-500"></div>
                <div class="p-8 flex flex-col items-center justify-center flex-grow text-center fade-in">
                    <div class="text-6xl mb-4">${isPerfect ? '🏆' : '👏'}</div>
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">퀴즈 완료!</h2>
                    <p class="text-lg text-gray-600 mb-6">총 ${questions.length}문제 중 <strong class="text-blue-600 text-2xl">${score}</strong>문제를 맞혔습니다.</p>
            `;

            if (isPerfect) {
                html += `<p class="text-green-600 font-bold text-xl mb-8">모든 문제를 맞히셨습니다! 완벽해요!</p>`;
                fireConfetti(true);
            } else {
                html += `<button onclick="renderWrongNotes()" class="mb-4 bg-orange-100 text-orange-700 hover:bg-orange-200 font-bold py-3 px-6 rounded-xl transition-colors border border-orange-300">오답 노트 보기 (${wrongList.length}문제)</button>`;
            }

            html += `
                    <button onclick="startQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition-colors w-full max-w-xs mt-4">처음부터 다시 풀기</button>
                </div>
            `;
            
            appEl.innerHTML = html;
        }

        // 오답 노트 화면
        function renderWrongNotes() {
            let html = `
                <div class="h-2 w-full bg-orange-400"></div>
                <div class="p-6 md:p-8 flex-col flex-grow overflow-y-auto max-h-[80vh] fade-in bg-gray-50">
                    <div class="flex justify-between items-center mb-6 sticky top-0 bg-gray-50 py-2 border-b">
                        <h2 class="text-2xl font-bold text-gray-800">📝 오답 노트</h2>
                        <button onclick="renderResult()" class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-gray-700">결과로 돌아가기</button>
                    </div>
                    <div class="space-y-6 pb-6">
            `;

            wrongList.forEach((q, idx) => {
                html += `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                        <div class="text-sm text-red-500 font-bold mb-2">틀린 문제 ${idx + 1}</div>
                        <p class="font-medium text-gray-800 mb-4">${q.q}</p>
                        
                        <div class="bg-green-50 text-green-800 p-3 rounded-lg border border-green-200 flex items-start">
                            <span class="font-bold mr-2 whitespace-nowrap">정답:</span>
                            <span>${getAnswerText(q)}</span>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-colors text-lg sticky bottom-0 shadow-[0_-10px_15px_-3px_rgba(249,250,251,1)]">다시 풀기</button>
                </div>
            `;
            
            appEl.innerHTML = html;
        }

        // --- 유틸리티 함수들 ---

        function getAnswerText(q) {
            if (q.type === 'ox') return q.a;
            if (q.type === 'multiple') return `${q.a + 1}번. ${q.options[q.a]}`;
            if (q.type === 'short' || q.type === 'essay') return q.a;
            return '';
        }

        let toastTimeout;
        function showToast(message, colorClass) {
            toastEl.textContent = message;
            // 초기화
            toastEl.className = `fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg text-white font-bold transition-all duration-300 z-50 ${colorClass}`;
            
            // 나타나기 애니메이션 적용
            setTimeout(() => {
                toastEl.classList.remove('opacity-0', 'translate-y-[-20px]');
                toastEl.classList.add('opacity-100', 'translate-y-0');
            }, 10);

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('opacity-100', 'translate-y-0');
                toastEl.classList.add('opacity-0', 'translate-y-[-20px]');
            }, 1500);
        }

        function fireConfetti(isContinuous = false) {
            if(isContinuous) {
                var duration = 3000;
                var end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42', '#ffa62d', '#ff36ff'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42', '#ffa62d', '#ff36ff'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            } else {
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                });
            }
        }

        // 앱 시작
        startQuiz();

    </script>
</body>
</html>
